<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FilterPro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 62.5%; }
  body { font-family: 'DM Sans', sans-serif; font-size: 1.6rem; background: #0d0d0d; color: #f5f4f0; min-height: 100vh; display: flex; flex-direction: column; }
  nav { display: flex; align-items: center; justify-content: space-between; padding: 1.8rem 5%; background: #0d0d0d; border-bottom: 1px solid rgba(255,255,255,0.07); position: fixed; top: 0; left: 0; right: 0; z-index: 100; }
  .logo { font-family: 'Comic Sans MS', sans-serif; font-weight: 800; font-size: 2.2rem; color: #f5f4f0; text-decoration: none; letter-spacing: -0.02em; }
  .logo span { color: #e85c2b; }
  .nav-right { display: flex; align-items: center; gap: 1.2rem; }
  .btn-carrito { position: relative; background: transparent; border: 1px solid rgba(255,255,255,0.22); color: #f5f4f0; font-family: 'Comic Sans MS', sans-serif; font-size: 1.4rem; padding: 0.8rem 1.8rem; border-radius: 4px; text-decoration: none; }
  .badge { position: absolute; top: -7px; right: -7px; background: #e85c2b; color: white; font-size: 1rem; font-weight: 700; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .btn-ingresar { background: #f5f4f0; color: #0d0d0d; font-family: 'Comic Sans MS', sans-serif; font-size: 1.4rem; font-weight: 500; padding: 0.8rem 2rem; border-radius: 4px; border: none; text-decoration: none; }
  .btn-ayuda { background: transparent; color: rgba(245,244,240,0.55); font-family: 'DM Sans', sans-serif; font-size: 1.7rem; padding: 0.8rem 1.8rem; border-radius: 6px; border: none; text-decoration: none; transform: translateX(40px)}

  main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 10rem 2rem 6rem; }
  .auth-box { width: 100%; max-width: 44rem; }
  .auth-logo { font-family: 'Comic Sans MS', sans-serif; font-weight: 800; font-size: 2.2rem; color: #f5f4f0; text-decoration: none; letter-spacing: -0.02em; display: block; text-align: center; margin-bottom: 3.2rem; }
  .auth-logo span { color: #e85c2b; }

  .tabs { display: flex; background: #161616; border: 1px solid rgba(255,255,255,0.08); border-radius: 6px 6px 0 0; overflow: hidden; }
  .tab-btn { flex: 1; background: none; border: none; color: rgba(245,244,240,0.4); font-family: 'DM Sans', sans-serif; font-size: 1.5rem; font-weight: 500; padding: 1.4rem; cursor: pointer; border-bottom: 2px solid transparent; text-decoration: none; display: flex; align-items: center; justify-content: center; transition: color 0.2s; }
  .tab-btn.active { color: #f5f4f0; background: rgba(255,255,255,0.04); border-bottom: 2px solid #e85c2b; }

  .auth-form { background: #161616; border: 1px solid rgba(255,255,255,0.08); border-top: none; border-radius: 0 0 6px 6px; padding: 3.2rem; }
  .form-group { margin-bottom: 2rem; }
  .form-group label { display: block; font-size: 1.3rem; font-weight: 500; color: rgba(245,244,240,0.55); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.8rem; }
  .form-group input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); color: #f5f4f0; font-family: 'DM Sans', sans-serif; font-size: 1.5rem; padding: 1.2rem 1.6rem; border-radius: 4px; outline: none; transition: border-color 0.2s; }
  .form-group input:focus { border-color: #e85c2b; }
  .form-group input::placeholder { color: rgba(245,244,240,0.25); }
  .btn-submit { width: 100%; background: #e85c2b; color: white; border: none; font-family: 'DM Sans', sans-serif; font-size: 1.5rem; font-weight: 500; padding: 1.4rem; border-radius: 4px; cursor: pointer; margin-top: 0.8rem; transition: background 0.2s; }
  .btn-submit:hover { background: #cf4e23; }

  footer { background: #0d0d0d; padding: 5.6rem 5% 3rem; margin-top: auto; }
  .footer-grid { display: grid; grid-template-columns: 1.8fr 1fr 1fr; gap: 4rem; padding-bottom: 4rem; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 2.8rem; }
  .footer-brand .logo { display: inline-block; margin-bottom: 1.6rem; }
  .footer-desc { font-size: 1.4rem; line-height: 1.75; color: rgba(245,244,240,0.38); max-width: 30rem; }
  .footer-col h4 { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 700; color: #f5f4f0; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 1.8rem; }
  .footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 1.1rem; }
  .footer-col ul a { font-size: 1.4rem; color: rgba(245,244,240,0.40); text-decoration: none; }
  .footer-col ul a:hover { color: rgba(245,244,240,0.8); }
  .footer-bottom { display: flex; align-items: center; justify-content: space-between; }
  .footer-copy { font-size: 1.3rem; color: rgba(245,244,240,0.22); }

  @media (max-width: 900px) { .footer-grid { grid-template-columns: 1fr; } .footer-bottom { flex-direction: column; gap: 0.8rem; } }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Filter<span>Pro</span></a>
  <a href="ayuda.html" class="btn-ayuda">Ayuda</a>

  <div class="nav-right">
    <a href="carrito.html" class="btn-carrito">Carrito</a>
    <div id="nav-sesion"></div>
  </div>
</nav>

<main>
  <div class="auth-box">
    <a href="index.html" class="auth-logo">Filter<span>Pro</span></a>
    <div class="tabs">
      <a href="login.html" class="tab-btn">Iniciar sesión</a>
      <a href="registro.html" class="tab-btn active">Registrar</a>
    </div>
    <div class="auth-form">
  <div class="form-group">
    <label>Primer nombre y primer apellido</label>
    <input type="text" id="reg-nombre" placeholder="Luis Pérez">
  </div>

  <div class="form-group">
    <label>Tipo de documento</label>
    <select id="reg-tipo-doc">
      <option value="">Selecciona...</option>
      <option value="1">Cédula de ciudadanía</option>
      <option value="2">Cédula de extranjería</option>
      <option value="3">Pasaporte</option>
      <option value="4">Tarjeta de identidad</option>
    </select>
  </div>

  <div class="form-group">
    <label>Número de identificación</label>
    <input type="text" id="reg-ident" placeholder="1234567890">
  </div>

  <div class="form-group">
    <label>Correo electrónico</label>
    <input type="email" id="reg-correo" placeholder="tu@correo.com">
  </div>

  <div class="form-group">
    <label>Teléfono</label>
    <input type="text" id="reg-tel" placeholder="3001234567">
  </div>

  <div class="form-group">
    <label>Dirección</label>
    <input type="text" id="reg-dir" placeholder="Calle 123 # 45-67">
  </div>

  <div class="form-group">
    <label>Contraseña</label>
    <input type="password" id="reg-password" placeholder="••••••••">
  </div>

  <div class="form-group">
    <label>Confirmar contraseña</label>
    <input type="password" id="reg-confirmar" placeholder="••••••••">
  </div>  
      <button class="btn-submit" onclick="registrarse()">Crear cuenta</button>
    </div>
  </div>
</main>

<footer>
  <div class="footer-grid">
    <div class="footer-brand"><a href="index.html" class="logo">Filter<span>Pro</span></a><p class="footer-desc">Venta en línea de filtros vehiculares para autos y motos.</p></div>
    <div class="footer-col"><h4>Navegación</h4><ul><li><a href="index.html">Inicio</a></li><li><a href="contacto.html">Contacto</a></li></ul></div>
    <div class="footer-col"><h4>Cuenta</h4><ul><li><a href="login.html">Ingresar</a></li><li><a href="carrito.html">Carrito</a></li></ul></div>
  </div>
  <div class="footer-bottom"><span class="footer-copy">© 2025 FilterPro - Proyecto universitario</span><span class="footer-copy">Filtros para autos y motocicletas</span></div>
</footer>

<script>
const API = 'https://filterpro-h3jz.onrender.com';

document.getElementById('badge').textContent = parseInt(localStorage.getItem('carrito') || '0');

async function registrarse() {
  const nombre    = document.getElementById('reg-nombre').value.trim();
  const correo    = document.getElementById('reg-correo').value.trim();
  const password  = document.getElementById('reg-password').value.trim();
  const confirmar = document.getElementById('reg-confirmar').value.trim();
  const tel       = document.getElementById('reg-tel').value.trim();
  const dir       = document.getElementById('reg-dir').value.trim();
  const ident     = document.getElementById('reg-ident').value.trim();
  const tipoDoc = document.getElementById('reg-tipo-doc').value;

  if (!nombre || !correo || !password || !confirmar || !tel || !dir || !ident || !tipoDoc) {
    alert('Por favor completa todos los campos.');
    return;
  }

  if (password !== confirmar) {
    alert('Las contraseñas no coinciden.');
    return;
  }

  if (password.length < 6) {
    alert('La contraseña debe tener al menos 6 caracteres.');
    return;
  }

  const partes = nombre.split(' ');
  const nom_usu1 = partes[0] || '';
  const ape_usu1 = partes[1] || '';
  console.log('tipo doc:', tipoDoc);
  try {
    const res = await fetch(`${API}/api/auth/registro`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        nom_usu1, ape_usu1,
        correo_usu: correo,
        n_ident: ident,
        cel_usu: tel,
        dir_usu: dir,
        password,
        tipo_usu: 'cliente',
        id_tipo_doc: tipoDoc
      })
    });

    const data = await res.json();
    if (!res.ok) { alert(data.error || 'Error al registrarse.'); return; }
    alert('¡Cuenta creada exitosamente! Ahora puedes iniciar sesión.');
    window.location.href = 'login.html';
  } catch (error) {
    alert('Error de conexión con el servidor.');
  }
}

const badge = document.getElementById('badge');
if (badge) badge.textContent = parseInt(localStorage.getItem('carrito') || '0');(localStorage.getItem('carrito') || '0');

  function renderNavSesion() {
  const usuario = JSON.parse(localStorage.getItem('usuario') || 'null');
  const el = document.getElementById('nav-sesion');
  if (usuario) {
    el.innerHTML = `
      <span style="font-size:1.6rem;color:#ffffff;">Hola, ${usuario.nombre.split(' ')[0]}</span>
      <button onclick="cerrarSesion()" style="background:transparent;border:1px solid rgba(255,255,255,0.22);color:#f5f4f0;font-family:'Comic Sans MS';font-size:1.4rem;padding:0.8rem 2rem;border-radius:4px;cursor:pointer; transform: translateX(20px);">
        Cerrar sesión
      </button>`;
  } else {
    el.innerHTML = `<div id="nav-sesion"></div>`;
  }
}

function cerrarSesion() {
  localStorage.removeItem('token');
  localStorage.removeItem('sesionActiva');
  localStorage.removeItem('usuario');
  window.location.href = 'login.html';}
</script>
</body>
</html>
